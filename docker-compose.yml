version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: musikwunsch-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: musikwunsch
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: musikwunsch-api
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: musikwunsch
      JWT_SECRET: your-secret-key-change-in-production
      JWT_EXPIRY: 24h
      REFRESH_TOKEN_EXPIRY: 7d
      FRONTEND_URL: http://87.106.215.187.nip.io
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src:ro
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: musikwunsch-web
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      # Traefik configuration for reverse proxy (hostname-based routing)
      - "traefik.enable=true"
      - "traefik.http.services.musikwunsch.loadbalancer.server.port=80"
      - "traefik.http.services.musikwunsch.loadbalancer.server.scheme=http"

      # HTTP router with hostname rule (nip.io for DNS)
      - "traefik.http.routers.musikwunsch-http.rule=Host(`musikwunsch.87-106-215-187.nip.io`)"
      - "traefik.http.routers.musikwunsch-http.entrypoints=web"
      - "traefik.http.routers.musikwunsch-http.service=musikwunsch"
      - "traefik.http.routers.musikwunsch-http.middlewares=redirect-https"

      # Middleware: redirect HTTP to HTTPS
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"

      # HTTPS router with hostname rule
      - "traefik.http.routers.musikwunsch-https.rule=Host(`musikwunsch.87-106-215-187.nip.io`)"
      - "traefik.http.routers.musikwunsch-https.entrypoints=websecure"
      - "traefik.http.routers.musikwunsch-https.service=musikwunsch"
      - "traefik.http.routers.musikwunsch-https.tls=true"
      - "traefik.http.routers.musikwunsch-https.tls.certresolver=letsencrypt"

volumes:
  postgres_data:
